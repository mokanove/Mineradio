<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mineradio</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      body {
        display: grid;
        place-items: center;
        color: rgba(255, 255, 255, 0.92);
        background:
          radial-gradient(
            circle at 50% 42%,
            rgba(255, 255, 255, 0.085),
            transparent 31%
          ),
          rgba(4, 5, 7, 0.96);
        font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
        user-select: none;
      }
      .boot {
        display: grid;
        justify-items: center;
        gap: 15px;
        transform: translateY(-2vh);
      }
      .mark {
        width: 54px;
        height: 54px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 17px;
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.16),
          rgba(255, 255, 255, 0.035)
        );
        box-shadow:
          0 18px 52px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.17);
        font-weight: 760;
        letter-spacing: -0.08em;
      }
      .name {
        font-size: 18px;
        font-weight: 650;
        letter-spacing: 0.02em;
      }
      .status {
        color: rgba(255, 255, 255, 0.48);
        font-size: 12px;
        letter-spacing: 0.08em;
      }
      .dots {
        display: flex;
        gap: 7px;
        height: 8px;
      }
      .dots i {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.7);
        animation: pulse 1.05s ease-in-out infinite;
      }
      .dots i:nth-child(2) {
        animation-delay: 0.14s;
      }
      .dots i:nth-child(3) {
        animation-delay: 0.28s;
      }
      @keyframes pulse {
        0%,
        70%,
        100% {
          opacity: 0.2;
          transform: translateY(0);
        }
        35% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }
    </style>
  </head>
  <body>
    <main class="boot" role="status" aria-live="polite">
      <div class="mark">MR</div>
      <div class="name">Mineradio</div>
      <div class="status">正在启动播放器</div>
      <div class="dots" aria-hidden="true"><i></i><i></i><i></i></div>
    </main>
  </body>
</html>
