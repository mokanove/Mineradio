name: courir,partir,venir,mourir

on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-latest"
            tag: "linux:pacman"
            release_file: "dist/*.pacman"
          - os: "ubuntu-latest"
            tag: "linux:rpm"
            release_file: "dist/*.rpm"
          - os: "ubuntu-latest"
            tag: "linux:AppImage"
            release_file: "dist/*.AppImage"
          - os: "ubuntu-latest"
            tag: "linux:deb"
            release_file: "dist/*.deb"
          - os: "macos-latest"
            tag: "macos"
            release_file: "dist/*.dmg"
          - os: "windows-latest"
            tag: "windows"
            release_file: "dist/*.exe"
    runs-on: ${{ matrix.os }}
    name: Build for ${{ matrix.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Get Version
        id: get_version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set up pnpm
        uses: pnpm/action-setup@master

      - name: Set up Node.js
        uses: actions/setup-node@main
        with:
          node-version: latest

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install libarchive-tools

      - name: Build!
        shell: bash
        run: |
          pnpm install
          pnpm build:${{ matrix.tag }}

      - name: Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: V${{ steps.get_version.outputs.version }}
          files: ${{ matrix.release_file }}
          fail_on_unmatched_files: true
          body: |
            # 📝 Release Note
            - Fixes and improvements
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
