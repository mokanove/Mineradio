<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mineradio Wallpaper</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050608;
      }
      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="wall"></canvas>
    <script>
      "use strict";
      var canvas = document.getElementById("wall");
      var ctx = canvas.getContext("2d", { alpha: false });
      var W = 1,
        H = 1,
        dpr = 1;
      var state = {
        enabled: false,
        title: "Mineradio",
        artist: "",
        cover: "",
        playing: false,
        preset: 0,
        opacity: 1,
        colors: {
          primary: "#d6f8ff",
          secondary: "#9cffdf",
          highlight: "#fff0b8",
          glow: "#9cffdf",
        },
      };
      var coverImg = null,
        coverSrc = "";
      var particles = [];
      function hexToRgb(hex, fallback) {
        hex = String(hex || fallback || "#9cffdf").trim();
        if (/^#[0-9a-f]{3}$/i.test(hex))
          hex = "#" + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3];
        if (!/^#[0-9a-f]{6}$/i.test(hex)) hex = fallback || "#9cffdf";
        return {
          r: parseInt(hex.slice(1, 3), 16),
          g: parseInt(hex.slice(3, 5), 16),
          b: parseInt(hex.slice(5, 7), 16),
        };
      }
      function rgba(hex, a) {
        var c = hexToRgb(hex);
        return "rgba(" + c.r + "," + c.g + "," + c.b + "," + a + ")";
      }
      function rand(seed) {
        return Math.abs(Math.sin(seed * 3187.917) * 43758.5453) % 1;
      }
      function ensureParticles() {
        var target = Math.min(
          760,
          Math.max(420, Math.round((innerWidth * innerHeight) / 4200)),
        );
        while (particles.length < target) {
          var i = particles.length + 1;
          particles.push({
            seed: i * 11.37,
            x: rand(i),
            y: rand(i * 2.7),
            lane: rand(i * 5.9),
            z: rand(i * 8.1),
            size: 0.6 + rand(i * 4.2) * 2.4,
          });
        }
        if (particles.length > target + 80) particles.length = target;
      }
      function resize() {
        dpr = Math.min(1.35, Math.max(1, window.devicePixelRatio || 1));
        W = Math.max(1, Math.floor(innerWidth * dpr));
        H = Math.max(1, Math.floor(innerHeight * dpr));
        canvas.width = W;
        canvas.height = H;
        canvas.style.width = innerWidth + "px";
        canvas.style.height = innerHeight + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ensureParticles();
      }
      function setCover(src) {
        src = String(src || "");
        if (src === coverSrc) return;
        coverSrc = src;
        coverImg = null;
        if (!src) return;
        var img = new Image();
        img.onload = function () {
          if (coverSrc === src) coverImg = img;
        };
        img.onerror = function () {
          if (coverSrc === src) coverImg = null;
        };
        img.src = src;
      }
      function applyState(next) {
        state = Object.assign({}, state, next || {});
        state.colors = Object.assign(
          {},
          state.colors,
          (next && next.colors) || {},
        );
        setCover(state.cover || "");
      }
      function drawCover(now) {
        if (!coverImg) return;
        var side =
          Math.min(innerWidth, innerHeight) *
          (0.42 + Math.sin(now * 0.21) * 0.012);
        var x = innerWidth * 0.5 - side * 0.5;
        var y = innerHeight * 0.5 - side * 0.5 + Math.sin(now * 0.37) * 8;
        ctx.save();
        ctx.globalAlpha = 0.16 * (state.opacity || 1);
        ctx.filter = "blur(28px) saturate(1.25)";
        ctx.drawImage(
          coverImg,
          x - side * 0.12,
          y - side * 0.12,
          side * 1.24,
          side * 1.24,
        );
        ctx.filter = "none";
        ctx.globalAlpha = 0.2 * (state.opacity || 1);
        ctx.drawImage(coverImg, x, y, side, side);
        ctx.restore();
      }
      function draw(nowMs) {
        var now = nowMs * 0.001;
        ensureParticles();
        var opacity = Math.max(0.35, Math.min(1, state.opacity || 1));
        var primary = state.colors.primary || "#d6f8ff";
        var secondary = state.colors.secondary || "#9cffdf";
        var highlight = state.colors.highlight || "#fff0b8";
        var glow = state.colors.glow || secondary;
        var bg = ctx.createLinearGradient(0, 0, innerWidth, innerHeight);
        bg.addColorStop(0, "#050608");
        bg.addColorStop(0.52, rgba(primary, 0.12 * opacity));
        bg.addColorStop(1, rgba(secondary, 0.1 * opacity));
        ctx.globalCompositeOperation = "source-over";
        ctx.globalAlpha = 1;
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, innerWidth, innerHeight);
        drawCover(now);
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        var cx = innerWidth * 0.5;
        var cy = innerHeight * 0.5 + Math.sin(now * 0.28) * innerHeight * 0.018;
        var rx = innerWidth * 0.4;
        var ry = innerHeight * 0.3;
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          var speed = 0.009 + rand(p.seed) * 0.021 + (state.playing ? 0.01 : 0);
          var a =
            (p.x * Math.PI * 2 +
              now * speed +
              Math.sin(now * 0.07 + p.seed) * 0.14) %
            (Math.PI * 2);
          var ring = 0.18 + p.z * 0.82;
          var wobble =
            Math.sin(now * (0.22 + rand(p.seed) * 0.18) + p.seed) * 12;
          var x =
            cx + Math.cos(a) * rx * ring + Math.sin(now * 0.11 + p.seed) * 24;
          var y =
            cy +
            Math.sin(a * (1.0 + rand(p.seed * 2) * 0.16)) * ry * ring +
            wobble;
          var tw = Math.pow(
            0.5 + 0.5 * Math.sin(now * (0.5 + rand(p.seed) * 0.42) + p.seed),
            4,
          );
          var r = Math.max(0.7, p.size * (0.8 + tw * 1.2));
          var col = tw > 0.74 ? highlight : p.lane > 0.55 ? secondary : glow;
          ctx.globalAlpha =
            (0.045 + tw * 0.18 + (state.playing ? 0.035 : 0)) * opacity;
          ctx.fillStyle = col;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
        var aura = ctx.createRadialGradient(
          cx,
          cy,
          0,
          cx,
          cy,
          Math.max(innerWidth, innerHeight) * 0.54,
        );
        aura.addColorStop(0, rgba(highlight, 0.12 * opacity));
        aura.addColorStop(0.34, rgba(secondary, 0.08 * opacity));
        aura.addColorStop(1, "rgba(0,0,0,0)");
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = aura;
        ctx.fillRect(0, 0, innerWidth, innerHeight);
        ctx.restore();
        requestAnimationFrame(draw);
      }
      window.addEventListener("resize", resize);
      resize();
      if (window.desktopOverlay && window.desktopOverlay.onWallpaperState) {
        window.desktopOverlay.onWallpaperState(applyState);
      }
      requestAnimationFrame(draw);
    </script>
  </body>
</html>
